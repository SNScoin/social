version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: social_stats_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: social_stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: social_stats_redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
